{{ define "main" }}

<main>
  <h1>{{ .Site.Params.notFound.title | default hugo.Data.default.notFound.title }}</h1>
  <p>{{ .Site.Params.notFound.paragraph | default hugo.Data.default.notFound.paragraph }}</p>
  {{ with (.Site.Params.notFound.image | default hugo.Data.default.notFound.image) }}
  <img src="{{ . }}" />
  {{ end }}
</main>

{{ end }}
