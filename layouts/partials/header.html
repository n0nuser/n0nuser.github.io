<div class="site-header-inner">
  <nav class="site-nav" aria-label="{{ T "main_menu" }}">
    {{ partial "custom/site-title" . }}

    {{ if .Site.Menus.main }}
      <ul class="site-nav-links">
        {{ range .Site.Menus.main }}
          <li>
            <a class="site-nav-link btnHeader" href="{{ .URL | relLangURL }}">{{ .Name }}</a>
          </li>
        {{ end }}
      </ul>
    {{ end }}
  </nav>
</div>
